# Configuration for Kokoro-82M TTS integration with AllTalk TTS for Daoko Live2D model

# ============== General Settings ==============
GENERAL:
  CHARACTER_NAME: "Daoko"
  LANGUAGE: "en"
  VOICE_SPEED: 1.0
  VOICE_VOLUME: 1.0
  VOICE_PITCH: 0.0
  VOICE_STABILITY: 0.5
  VOICE_CLARITY: 0.5
  VOICE_EMOTION_INTENSITY: 0.7

# ============== TTS Settings ==============
TTS_CONFIG:
  TTS_ENGINE: "alltalk_tts"
  TTS_VOICE: "en_US-ljspeech-high.onnx"  # Base voice from AllTalk
  TTS_LANGUAGE: "en"
  TTS_API_URL: "http://127.0.0.1:7851"  # URL of the AllTalk TTS API server
  TTS_RVC_ENABLED: true  # Enable RVC voice conversion
  TTS_RVC_MODEL: "daoko[23]_16hs_3bs_SPLICED_NPROC_40k_v1"  # RVC model for Daoko
  TTS_RVC_PITCH: 0  # Pitch adjustment for RVC voice conversion
  TTS_CACHE_DIR: "cache"
  TTS_OUTPUT_FORMAT: "wav"
  # Emotion mapping from our emotion tags to AllTalk styles
  TTS_EMOTION_MAPPING:
    joy: "happy"
    sadness: "sad"
    anger: "angry"
    fear: "fearful"
    surprise: "surprised"
    disgust: "disgusted"
    neutral: "neutral"
    smirk: "happy"

# ============== Live2D Settings ==============
LIVE2D_CONFIG:
  LIVE2D_BACKEND: "pixi"
  LIVE2D_MODEL_PATH: "live2d-models/shizuku/runtime/shizuku.model3.json"
  LIVE2D_EXPRESSION_PATH: "live2d-models/shizuku/runtime/expressions"
  LIVE2D_IDLE_MOTION_GROUP: "Idle"
  LIVE2D_IDLE_MOTION_PRIORITY: 1
  LIVE2D_EXPRESSION_MAP:
    neutral: "neutral.exp3.json"
    joy: "happy.exp3.json"
    sadness: "sad.exp3.json"
    anger: "angry.exp3.json"
    surprise: "surprised.exp3.json"
    fear: "fearful.exp3.json"
    disgust: "disgusted.exp3.json"
    smirk: "smirk.exp3.json"

# ============== Emotion-Motion Mapping ==============
EMOTION_MOTION_MAP:
  joy: ["tap_body"]       # Happy/excited motions
  sadness: ["shake"]      # Sad/downcast motions
  anger: ["shake"]        # Angry/frustrated motions
  disgust: ["shake"]      # Disgusted motions
  fear: ["pinch_in"]      # Fearful/anxious motions
  surprise: ["flick_head"] # Surprised motions
  smirk: ["tap_body"]     # Mischievous/playful motions
  neutral: ["idle"]       # Default idle motions

# ============== LLM Settings ==============
LLM_CONFIG:
  LLM_PROVIDER: "openai"
  LLM_MODEL: "gpt-4o"
  LLM_TEMPERATURE: 0.7
  LLM_TOP_P: 0.9
  LLM_FREQUENCY_PENALTY: 0.0
  LLM_PRESENCE_PENALTY: 0.0
  LLM_MAX_TOKENS: 1000
  LLM_STOP_SEQUENCES: []
  LLM_SYSTEM_PROMPT_PATH: "prompts/daoko.md"
